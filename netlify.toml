[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  # MySQL Configuration
  MYSQL_HOST = "your-mysql-host"
  MYSQL_PORT = "3306"
  MYSQL_USER = "your-mysql-user"
  MYSQL_PASSWORD = "your-mysql-password"
  MYSQL_DATABASE = "indonesian_license_app"


